          ".local/share/terminfo/c"
          ".local/share/terminfo/3"
          ".local/share/terminfo/t"
          ".local/share/terminfo/f"
          ".local/share/terminfo/4"
          ".local/share/terminfo/e"
          ".local/share/terminfo/o"
          ".local/share/terminfo/m"
          ".local/share/terminfo/Q"
          ".local/share/terminfo/6"
          ".local/share/terminfo/9"
          ".local/share/terminfo/b"
          ".local/share/terminfo/E"
          ".local/share/terminfo/x"
          ".local/share/terminfo/n"
          ".local/share/terminfo/s"
          ".local/share/terminfo/p"
          ".local/share/terminfo/5"
          ".local/share/terminfo/a"
          ".local/share/terminfo/u"
          ".local/share/terminfo/j"
          ".local/share/terminfo/k"
          ".local/share/man"
          ".local/share/man/man1"
          ".local/lib"
          ".local/lib/itcl4.2.4"
          ".local/lib/pkgconfig"
          ".local/lib/thread2.8.9"
          ".local/lib/tcl8"
          ".local/lib/tcl8/8.6"
          ".local/lib/tcl8/8.4"
          ".local/lib/tcl8/8.4/platform"
          ".local/lib/tcl8/8.5"
          ".local/lib/python3.13"
          ".local/lib/python3.13/collections"
          ".local/lib/python3.13/ctypes"
          ".local/lib/python3.13/ctypes/macholib"
          ".local/lib/python3.13/xml"
          ".local/lib/python3.13/xml/dom"
          ".local/lib/python3.13/xml/parsers"
          ".local/lib/python3.13/xml/sax"
          ".local/lib/python3.13/xml/etree"
          ".local/lib/python3.13/tkinter"
          ".local/lib/python3.13/turtledemo"
          ".local/lib/python3.13/tomllib"
