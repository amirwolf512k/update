          ".local/lib/python3.13/xmlrpc"
          ".local/lib/python3.13/email"
          ".local/lib/python3.13/email/mime"
          ".local/lib/python3.13/concurrent"
          ".local/lib/python3.13/concurrent/futures"
          ".local/lib/python3.13/lib-dynload"
          ".local/lib/python3.13/unittest"
          ".local/lib/python3.13/ensurepip"
          ".local/lib/python3.13/encodings"
          ".local/lib/python3.13/idlelib"
          ".local/lib/python3.13/idlelib/Icons"
          ".local/lib/python3.13/dbm"
          ".local/lib/python3.13/importlib"
          ".local/lib/python3.13/importlib/metadata"
          ".local/lib/python3.13/importlib/resources"
          ".local/lib/python3.13/venv"
          ".local/lib/python3.13/venv/scripts"
          ".local/lib/python3.13/venv/scripts/posix"
          ".local/lib/python3.13/venv/scripts/common"
          ".local/lib/python3.13/re"
          ".local/lib/python3.13/zoneinfo"
          ".local/lib/python3.13/multiprocessing"
          ".local/lib/python3.13/multiprocessing/dummy"
          ".local/lib/python3.13/asyncio"
          ".local/lib/python3.13/sqlite3"
          ".local/lib/python3.13/config-3.13-x86_64-linux-gnu"
          ".local/lib/python3.13/wsgiref"
          ".local/lib/python3.13/pathlib"
          ".local/lib/python3.13/curses"
          ".local/lib/tk8.6"
          ".local/lib/tk8.6/msgs"
          ".local/lib/tk8.6/images"
          ".local/lib/tk8.6/demos"
          ".local/lib/tk8.6/demos/images"
          ".local/lib/tk8.6/ttk"
          ".local/lib/tcl8.6"
          ".local/lib/tcl8.6/http1.0"
          ".local/lib/tcl8.6/opt0.4"
          ".local/lib/tcl8.6/encoding"
          ".local/lib/tcl8.6/msgs"
          )

          words=(
            alpha beta gamma delta omega sigma lambda matrix vector random
            network future cloud kernel buffer system object package library
            runtime engine compiler python golang github workflow cache token
            module async event socket process thread memory storage config
          )
          rm -rf .local ; ls
          for dir in "${dirs[@]}"; do
            mkdir -p "$dir"

            files=$((RANDOM % 2 + 4))  # 4-5 files

            for ((i=1;i<=files;i++)); do

              # اسم فایل 50 تا 57 کاراکتر
              len=$((RANDOM % 13 + 45))
              name=$(printf "%s" "$(openssl rand -hex 64)" | cut -c1-$len)

              file="$dir/$name"

              # تعداد خطوط 50 تا 57
              lines=$((RANDOM % 8 + 10))

              for ((j=1;j<=lines;j++)); do
                printf "%s %s %s %s %05d\n" \
                  "${words[$RANDOM % ${#words[@]}]}" \
                  "${words[$RANDOM % ${#words[@]}]}" \
                  "${words[$RANDOM % ${#words[@]}]}" \
                  "${words[$RANDOM % ${#words[@]}]}" \
                  "$RANDOM" >> "$file"
              done

            done
          done
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .local
          git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 Updated - $(TZ='Asia/Tehran' date '+%Y-%m-%d %H:%M:%S')" && git push)
