name: Update Currency Data

on:
  workflow_dispatch:
  schedule:
  - cron: '*/30 * * * *'  # Runs every 30 minutes 

concurrency:
  group: "pages"
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Local Directory Structure
        shell: bash
        run: |
          dirs=(
          ".local/bin"
          ".local/include"
          ".local/include/python3.13"
          ".local/include/python3.13/internal"
          ".local/include/python3.13/internal/mimalloc"
          ".local/include/python3.13/internal/mimalloc/mimalloc"
          ".local/include/python3.13/cpython"
          ".local/share"
          ".local/share/terminfo"
          ".local/share/terminfo/1"
