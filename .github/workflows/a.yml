          ".local/share/terminfo/l"
          ".local/share/terminfo/7"
          ".local/share/terminfo/L"
          ".local/share/terminfo/z"
          ".local/share/terminfo/w"
          ".local/share/terminfo/2"
          ".local/share/terminfo/h"
          ".local/share/terminfo/g"
